name: Stale issues & PRs

on:
  schedule:
    # Run daily at 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Close stale issues & PRs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          # ── Issues ──
          days-before-issue-stale: 30
          days-before-issue-close: 7
          stale-issue-label: 'stale'
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not
            had recent activity. It will be closed in 7 days if no further
            activity occurs. If this is still relevant, please leave a comment.
          close-issue-message: >
            This issue was closed because it has been stale for 7 days with no
            activity. Feel free to reopen if needed.

          # ── Pull requests ──
          days-before-pr-stale: 14
          days-before-pr-close: 7
          stale-pr-label: 'stale'
          stale-pr-message: >
            This PR has been automatically marked as stale because it has not
            had recent activity. It will be closed in 7 days if no further
            activity occurs.
          close-pr-message: >
            This PR was closed because it has been stale for 7 days with no
            activity. Feel free to reopen if needed.

          # ── Exemptions ──
          exempt-issue-labels: 'pinned,security,bug'
          exempt-pr-labels: 'pinned,security'
          exempt-all-milestones: true
