name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

# Cancel in-flight CI runs for the same branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Path filter (skip jobs when their code hasn't changed) ─
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
              - '.github/workflows/ci.yml'
            backend:
              - 'backend/**'
              - '.github/workflows/ci.yml'

  # ─── Frontend checks ───────────────────────────────────────
  frontend:
    name: Frontend (validate · build)
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # ── Cache: Prisma engines (skip 15-40MB download) ──
      - name: Cache Prisma engines
        uses: actions/cache@v5
        with:
          path: |
            node_modules/.prisma
            node_modules/@prisma/engines
          key: prisma-${{ runner.os }}-${{ hashFiles('frontend/prisma/schema.prisma') }}
          restore-keys: prisma-${{ runner.os }}-

      # ── Cache: Next.js build cache (biggest win ~60-80% faster rebuilds) ──
      - name: Cache Next.js build
        uses: actions/cache@v5
        with:
          path: frontend/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}-${{ hashFiles('frontend/**/*.ts', 'frontend/**/*.tsx') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}-
            nextjs-${{ runner.os }}-

      - run: npm ci

      # Prisma: generate client + validate schema
      - run: npx prisma generate
      - run: npx prisma validate

      # Prisma: catch schema changes without a matching migration
      - name: Check migration drift
        run: |
          SCHEMA_CHANGED=$(git diff --name-only ${{ github.event.before || 'HEAD~1' }} HEAD -- prisma/schema.prisma || true)
          MIGRATION_CHANGED=$(git diff --name-only ${{ github.event.before || 'HEAD~1' }} HEAD -- prisma/migrations/ || true)
          if [ -n "$SCHEMA_CHANGED" ] && [ -z "$MIGRATION_CHANGED" ]; then
            echo "::error::prisma/schema.prisma was modified but no new migration was added."
            echo "Run 'npx prisma migrate dev --name <description>' to create a migration."
            exit 1
          fi
          echo "✓ Schema and migrations are in sync"

      # Next.js production build (includes TypeScript checking via ignoreBuildErrors: false)
      # No separate tsc --noEmit needed — Next.js build already type-checks
      - name: Build Next.js
        env:
          DATABASE_URL_MAINLIVE: "postgresql://stub:stub@localhost:5432/stub"
          AUTH_SECRET: "ci-build-stub-secret-not-real"
          AUTH_URL: "http://localhost:3000"
          NEXT_PUBLIC_APP_URL: "http://localhost:3000"
          EDGE_STORE_ACCESS_KEY: "stub"
          EDGE_STORE_SECRET_KEY: "stub"
          NEXT_PUBLIC_PUSHER_KEY: "stub"
          NEXT_PUBLIC_PUSHER_CLUSTER: "eu"
          RESEND_API_KEY: "re_stub"
        run: npm run build

  # ─── Frontend lint (parallel) ──────────────────────────────
  frontend-lint:
    name: Frontend (lint)
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npx prisma generate
      - run: npm run lint

  # ─── Backend checks ────────────────────────────────────────
  backend:
    name: Backend (validate · typecheck · build)
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      # ── Cache: Prisma engines ──
      - name: Cache Prisma engines
        uses: actions/cache@v5
        with:
          path: |
            node_modules/.prisma
            node_modules/@prisma/engines
            src/generated/prisma
          key: prisma-backend-${{ runner.os }}-${{ hashFiles('backend/prisma/schema.prisma') }}
          restore-keys: prisma-backend-${{ runner.os }}-

      - run: npm ci

      # Prisma: generate client + validate schema
      - run: npx prisma generate
      - run: npx prisma validate

      # TypeScript: compile (backend uses tsc for build)
      - run: npx tsc --noEmit
