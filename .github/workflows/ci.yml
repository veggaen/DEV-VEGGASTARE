name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight CI runs for the same branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Frontend checks ───────────────────────────────────────
  frontend:
    name: Frontend (validate · typecheck · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      # Prisma: generate client + validate schema
      - run: npx prisma generate
      - run: npx prisma validate

      # TypeScript: full type-check (no emit)
      - run: npx tsc --noEmit

      # Next.js production build (catches runtime + TS errors)
      # Stub env vars that are required at build time but are secrets in prod
      - name: Build Next.js
        env:
          DATABASE_URL: "postgresql://stub:stub@localhost:5432/stub"
          DIRECT_URL: "postgresql://stub:stub@localhost:5432/stub"
          AUTH_SECRET: "ci-build-stub-secret-not-real"
          AUTH_URL: "http://localhost:3000"
          NEXT_PUBLIC_APP_URL: "http://localhost:3000"
          EDGE_STORE_ACCESS_KEY: "stub"
          EDGE_STORE_SECRET_KEY: "stub"
          NEXT_PUBLIC_PUSHER_KEY: "stub"
          NEXT_PUBLIC_PUSHER_CLUSTER: "eu"
          RESEND_API_KEY: "re_stub"
        run: npm run build

  # ─── Backend checks ────────────────────────────────────────
  backend:
    name: Backend (validate · typecheck · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      # Prisma: generate client + validate schema
      - run: npx prisma generate
      - run: npx prisma validate

      # TypeScript: compile (backend uses tsc for build)
      - run: npx tsc --noEmit
