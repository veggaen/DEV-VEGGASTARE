# CodeQL Analysis — Static Application Security Testing (SAST)
# Scans TypeScript/JavaScript code for vulnerabilities and security issues
# https://docs.github.com/en/code-security/code-scanning/automatically-scanning-your-code-for-vulnerabilities-and-errors

name: Code Scanning (CodeQL)

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  schedule:
    # Run weekly on Sundays at 3am UTC to catch new vulnerability patterns
    - cron: '0 3 * * 0'
  workflow_dispatch:

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          # Use extended security queries for deeper analysis
          queries: security-extended
          # Config file can customize which queries run
          # config-file: ./.github/codeql/codeql-config.yml

      # CodeQL autobuild should work for most JS/TS projects
      # If you need custom build steps, replace autobuild with your build commands
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"
