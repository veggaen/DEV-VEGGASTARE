name: E2E Tests (Playwright)

on:
  # Runs on PRs to main/dev when e2e tests or critical frontend code changes
  pull_request:
    branches: [main, dev]
    paths:
      - 'frontend/e2e/**'
      - 'frontend/playwright.config.*'
      - 'frontend/app/**'
      - 'frontend/components/**'
  # Manual trigger for on-demand runs
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Base URL to test against (e.g. Vercel preview URL)'
        required: false
        default: 'http://localhost:3000'

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - run: npx prisma generate

      # Install Playwright browsers (cached for speed)
      - name: Cache Playwright browsers
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # Run E2E tests
      - name: Run Playwright tests
        env:
          BASE_URL: ${{ inputs.base_url || 'http://localhost:3000' }}
          # Stub env vars for the app
          DATABASE_URL_MAINLIVE: "postgresql://stub:stub@localhost:5432/stub"
          AUTH_SECRET: "ci-e2e-stub-secret-not-real"
          AUTH_URL: "http://localhost:3000"
          NEXT_PUBLIC_APP_URL: "http://localhost:3000"
          EDGE_STORE_ACCESS_KEY: "stub"
          EDGE_STORE_SECRET_KEY: "stub"
          NEXT_PUBLIC_PUSHER_KEY: "stub"
          NEXT_PUBLIC_PUSHER_CLUSTER: "eu"
          RESEND_API_KEY: "re_stub"
        run: npx playwright test

      # Upload test results as artifacts (viewable in GitHub UI)
      - name: Upload Playwright report
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14
