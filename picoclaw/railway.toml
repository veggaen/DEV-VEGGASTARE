# PicoClaw Research Sidecar — Railway deployment config
# Lightweight Go binary: <10MB RAM, fast cold starts

[build]
builder = "DOCKERFILE"
dockerfilePath = "picoclaw/Dockerfile"

[deploy]
startCommand = "picoclaw gateway --config /etc/picoclaw/config.json --port 8080"
healthcheckPath = "/health"
healthcheckTimeout = 5
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[services]]
name = "picoclaw"
port = 8080

[service]
internalPort = 8080
